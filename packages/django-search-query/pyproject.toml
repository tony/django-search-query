[project]
name = "django-search-query"
version = "0.1.0a0"
description = "Structured, Lucene-inspired search query language for Django."
requires-python = ">=3.12,<4.0"
authors = [
  {name = "Tony Narlock", email = "tony@git-pull.com"}
]
license = { text = "MIT" }
readme = "README.md"
keywords = ["django", "search", "query", "query-language", "lucene", "parser"]
classifiers = [
  'Development Status :: 2 - Pre-Alpha',
  'Environment :: Web Environment',
  'Framework :: Django',
  'Framework :: Django :: 5.2',
  'Framework :: Django :: 6.0',
  'Intended Audience :: Developers',
  'License :: OSI Approved :: MIT License',
  'Operating System :: OS Independent',
  'Programming Language :: Python',
  'Programming Language :: Python :: 3',
  'Programming Language :: Python :: 3.12',
  'Programming Language :: Python :: 3.13',
  'Programming Language :: Python :: 3.14',
  'Topic :: Internet :: WWW/HTTP',
  'Topic :: Software Development :: Libraries',
  "Typing :: Typed",
]
dependencies = [
  "django>=5.2",
]

[project.urls]
"Bug Tracker" = "https://github.com/tony/django-search-query/issues"
Documentation = "https://django-search-query.git-pull.com"
Repository = "https://github.com/tony/django-search-query"
Changes = "https://github.com/tony/django-search-query/blob/master/CHANGES"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/django_search_query"]

[tool.hatch.build.targets.sdist]
include = [
  "src/",
  "README.md",
]
