name: tests

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.14']
        django-version: ['5.2', '6.0']
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-packages --group dev

      - name: Install django @ ${{ matrix.django-version }}
        run: uv pip install "Django~=${{ matrix.django-version }}.0"

      - name: Print versions
        run: |
          uv run python -V
          uv run python -c "import django; print('Django', django.get_version())"

      - name: Lint with ruff check
        run: uv run ruff check .

      - name: Format with ruff format
        run: uv run ruff format . --check

      - name: Type check with ty
        run: uv run ty check

      - name: Test with pytest
        run: uv run pytest --cov=./ --cov-report=xml

      - uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    permissions:
      id-token: write
      attestations: write

    strategy:
      matrix:
        python-version: ['3.14']

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      # Build every workspace package. skip-existing below means already-published
      # versions are no-ops, so an independent single-package release is safe.
      - name: Build packages
        run: uv build --all-packages

      - name: Publish packages
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
          skip-existing: true
